    <text x="80" y="290" font-family="Helvetica, Arial, sans-serif" font-size="88" font-weight="700" fill="#131a3d" letter-spacing="-2">A/B testing that runs</text>
    <text x="80" y="396" font-family="Helvetica, Arial, sans-serif" font-size="88" font-weight="700" fill="#131a3d" letter-spacing="-2">on a <tspan fill="#131a3d">$5 VPS</tspan></text>
