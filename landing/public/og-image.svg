      <circle cx="17.5" cy="12" r="0.9" fill="#2a4eff" clip-path="url(#flask-inner-sm)"/>
      <circle cx="15" cy="14" r="0.7" fill="#2a4eff" clip-path="url(#flask-inner-sm)"/>
      <path d="M11.5 4 H20.5 A0.5 0.5 0 0 1 21 4.5 V5.5 A0.5 0.5 0 0 1 20.5 6 H20 V11 L26.6 25.4 A1.6 1.6 0 0 1 25.2 27.8 H6.8 A1.6 1.6 0 0 1 5.4 25.4 L12 11 V6 H11.5 A0.5 0.5 0 0 1 11 5.5 V4.5 A0.5 0.5 0 0 1 11.5 4 Z" fill="none" stroke="#0d122e" stroke-width="1.6" stroke-linejoin="round"/>
