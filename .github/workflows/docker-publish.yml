name: Docker publish

on:
  workflow_dispatch:

jobs:
  publish:
    name: Build & push
    runs-on: ubuntu-latest
    steps:
      - name: Guard - main only
        if: github.ref != 'refs/heads/main'
        run: |
          echo "::error::This workflow can only be run from the main branch (got ${{ github.ref }})."
          exit 1

      - uses: actions/checkout@v4

      - name: Read version from Cargo.toml
        id: ver
        run: |
          VERSION=$(grep -m1 '^version' Cargo.toml | sed -E 's/.*"([^"]+)".*/\1/')
          if [ -z "$VERSION" ]; then
            echo "::error::Could not parse version from Cargo.toml"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Publishing version $VERSION"

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Fail if tag already exists on Docker Hub
        run: |
          if docker manifest inspect "${{ secrets.DOCKERHUB_USER }}/easy-experiments:${{ steps.ver.outputs.version }}" >/dev/null 2>&1; then
            echo "::error::Tag ${{ steps.ver.outputs.version }} already published — bump version in Cargo.toml"
            exit 1
          fi

      - uses: docker/setup-buildx-action@v3

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USER }}/easy-experiments:${{ steps.ver.outputs.version }}
            ${{ secrets.DOCKERHUB_USER }}/easy-experiments:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
