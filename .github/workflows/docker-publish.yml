name: Docker publish

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Image version tag (e.g. 0.1.0)'
        required: true
        type: string

jobs:
  publish:
    name: Build & push
    runs-on: ubuntu-latest
    steps:
      - name: Guard - main only
        if: github.ref != 'refs/heads/main'
        run: |
          echo "::error::This workflow can only be run from the main branch (got ${{ github.ref }})."
          exit 1

      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USER }}/easy-experiments:${{ inputs.version }}
            ${{ secrets.DOCKERHUB_USER }}/easy-experiments:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
