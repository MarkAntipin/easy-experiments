[package]
name = "easy_experiments"
version = "0.1.0"
authors = ["Mark Antipin <mr.antipin@gmail.com>"]
edition = "2021"

[lib]
path = "src/lib.rs"

[[bin]]
path = "src/main.rs"
name = "easy_experiments"

[dependencies]
actix-web = "4.9.0"
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }
serde = { version = "1.0.216", features = ["derive"] }
config = "0.11.0"
dotenv = "0.15.0"
serde_json = "1.0.134"
derive_more = "0.99.18"
actix-cors = "0.7.0"
env_logger = "0.11.6"
log = "0.4.25"
chrono = { version = "0.4.39", features = ["serde"] }
sqlx = { version = "0.8", features = ["runtime-tokio", "sqlite", "macros", "chrono"] }
duckdb = { version = "1.2", features = ["bundled"] }

[dev-dependencies]
reqwest = { version = "0.12.9", features = ["json"] }
uuid = { version = "1.12.0", features = ["v4"] }
rand = "0.9.2"
